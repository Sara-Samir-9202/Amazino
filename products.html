<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products – Amazino</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="css/Navbarauth.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel='stylesheet' type='text/css' href='css/components.css'>
    <link rel='stylesheet' href='css/Navbarauth.css'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="js/auth.js"></script>
  <script src="js/store.js"></script>
  <script src="js/data.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/footer.js"></script>
  <style>
    :root { --main-color: rgb(124,29,124); }
    body { background: #f5f5f5; margin: 0; }
    .page-header { background: linear-gradient(135deg,#7c1d7c,#b19470); padding: 3rem 0 2rem; color: #fff; text-align: center; margin-bottom: 2rem; margin-top: 70px; }
    .page-header h1 { font-size: 2.5rem; font-weight: 800; margin: 0; }
    .sidebar { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .sidebar-title { font-weight: 700; color: #333; margin-bottom: 1rem; font-size: 1rem; border-bottom: 2px solid var(--main-color); padding-bottom: .5rem; }
    .card-product { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.08); position: relative; transition: transform .2s, box-shadow .2s; cursor: pointer; }
    .card-product:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(124,29,124,.15); }
    .badge-discount { position: absolute; top: 10px; left: 10px; background: var(--main-color); color: #fff; padding: 2px 8px; border-radius: 20px; font-size: .75rem; font-weight: 600; z-index: 1; }
    .shop-icon { position: absolute; top: 10px; right: 10px; width: 36px; height: 36px; background: var(--main-color); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1; transition: background .2s; }
    .shop-icon:hover { background: #5a0f5a; }
    .price-old { text-decoration: line-through; color: #999; font-size: .85rem; margin-left: .4rem; }
    .page-btn { border: 2px solid var(--main-color); background: #fff; color: var(--main-color); padding: 6px 14px; border-radius: 8px; cursor: pointer; margin: 2px; font-weight: 600; transition: all .2s; }
    .page-btn:hover, .page-btn.active { background: var(--main-color); color: #fff; }
    #sort-select { border: 2px solid #ddd; border-radius: 8px; padding: 6px 12px; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div id="navbar-container"></div>

  <div class="page-header">
    <h1>Our Products</h1>
    <nav aria-label="breadcrumb" class="mt-2">
      <ol class="breadcrumb justify-content-center mb-0" style="background:transparent">
        <li class="breadcrumb-item"><a href="index.html" class="text-white-50">Home</a></li>
        <li class="breadcrumb-item active text-white">Products</li>
      </ol>
    </nav>
  </div>

  <div class="container-fluid px-4 px-lg-5 pb-5">
    <div class="row g-4">
      <!-- Sidebar Filters -->
      <div class="col-lg-3">
        <div class="sidebar">
          <div class="sidebar-title"><i class="bi bi-funnel me-2"></i>Filter Products</div>

          <!-- Search -->
          <div class="mb-4">
            <input type="text" id="searchInput" class="form-control" placeholder="🔍 Search products…">
          </div>

          <div class="mb-4">
            <div class="fw-bold mb-2">Sort By</div>
            <select id="sortFilter" class="form-select">
              <option value="">Default</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="rating">Top Rated</option>
              <option value="newest">Newest</option>
            </select>
          </div>

          <div class="mb-4">
            <div class="fw-bold mb-2">Category</div>
            <select id="categoryFilter" class="form-select">
              <option value="">All Categories</option>
            </select>
          </div>

          <div class="mb-2">
            <div class="fw-bold mb-2">Max Price: <span id="price-max">$9999</span></div>
            <input type="range" id="price-range" class="form-range" min="50" max="9999" step="10" value="9999">
          </div>
        </div>
      </div>

      <!-- Products Grid -->
      <div class="col-lg-9">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <span id="showing-results" class="text-muted small"></span>
        </div>
        <div class="row row-cols-1 row-cols-sm-2 row-cols-xl-3 g-4" id="product-grid">
          <div class="col-12 text-center py-5">
            <div class="spinner-border" style="color:var(--main-color)"></div>
            <p class="mt-2 text-muted">Loading products…</p>
          </div>
        </div>
        <div class="d-flex justify-content-center mt-4" id="pagination-container"></div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/store.js"></script>
  <script src="js/data.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
